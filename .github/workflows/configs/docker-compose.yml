services:
  postgres:
    image: postgres:16-alpine@sha256:16bc17c64a573ef34162af9298258d1aec548232985b33ed7b1eac33ba35c229
    environment:
      POSTGRES_USER: bifrost
      POSTGRES_PASSWORD: bifrost_password
      POSTGRES_DB: bifrost
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bifrost -d bifrost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      bifrost_network:
        # PINNED IP - harden-runner (egress-policy: block) filters on the
        # post-NAT destination IP. Host processes dial 127.0.0.1:5432, which
        # Docker DNATs to this bridge IP, so this exact IP must appear in the
        # allowed-endpoints of every release-pipeline job that talks to Postgres
        # over the published port (test-migrations, test-bifrost-http,
        # test-api-integrations). Keep in sync with the 172.38.0.11:5432 entries
        # in .github/workflows/release-pipeline.yml.
        ipv4_address: 172.38.0.11

  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.32.4@sha256:920463cf9a9b2b8d38e5b925d63f6928fa703277c93df11d5a75fc75e1fff758
    command:
        - --host
        - 0.0.0.0
        - --port
        - '8080'
        - --scheme
        - http
    environment:
        - CLUSTER_HOSTNAME=weaviate
        - CLUSTER_ADVERTISE_ADDR=172.38.0.12
        - CLUSTER_GOSSIP_BIND_PORT=7946
        - CLUSTER_DATA_BIND_PORT=7947
        - DISABLE_TELEMETRY=true
        - PERSISTENCE_DATA_PATH=/var/lib/weaviate
        - DEFAULT_VECTORIZER_MODULE=none
        - ENABLE_MODULES=
        - AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED=true
        - LOG_LEVEL=info
    ports:
        - "9000:8080"
    volumes:
        - weaviate_data:/var/lib/weaviate
    networks:
        bifrost_network:
            ipv4_address: 172.38.0.12

  # Redis Stack instance for vector store tests
  redis-stack:
    image: redis/redis-stack:7.4.0-v6@sha256:b6567ad2e9c0658bbf6c40657ee0576df4b82cb674763f8ae6d0c52046ef87f1
    command: redis-stack-server --protected-mode no
    ports:
        - "6379:6379"
        - "8001:8001"  # RedisInsight web UI
    volumes:
        - redis_data:/data
    networks:
        bifrost_network:
            ipv4_address: 172.38.0.13
    healthcheck:
        test: ["CMD", "redis-cli", "ping"]
        interval: 10s
        timeout: 5s
        retries: 5

  # Qdrant instance for vector store tests
  qdrant:
    image: qdrant/qdrant:v1.16.0@sha256:1005201498cf927d835383d0f918b17d8c9da7db58550f169f694455e42d78f4
    ports:
        - "6333:6333"  # REST API
        - "6334:6334"  # gRPC API
    volumes:
        - qdrant_data:/qdrant/storage
    networks:
        bifrost_network:
            ipv4_address: 172.38.0.14
    healthcheck:
        test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
        interval: 10s
        timeout: 5s
        retries: 5

networks:
  bifrost_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.38.0.0/16
          gateway: 172.38.0.1

volumes:
  postgres_data:
    driver: local
  weaviate_data:
    driver: local
  redis_data:
    driver: local
  qdrant_data:
    driver: local


      - name: Build and push UBI9 AMD64 Docker image
        uses: step-security/docker-build-push-action@846549baaf047e867d038826129a64d81df0f704 # v7.1.0
        with:
          context: .
          build-args: |
            VERSION=${{ needs.detect-changes.outputs.transport-version }}
          file: ./transports/Dockerfile.redhat
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          platforms: linux/amd64
          cache-from: type=gha,scope=docker-ubi9-amd64
          cache-to: type=gha,mode=max,scope=docker-ubi9-amd64

      # Mirror the just-pushed Docker Hub image to GitHub Container Registry (ghcr.io)
      # by copying it with buildx imagetools (no rebuild). Best-effort: a ghcr.io
      # failure must not fail the Docker Hub release.
      - name: Mirror UBI9 AMD64 image to GitHub Container Registry
        continue-on-error: true
        run: |
          docker buildx imagetools create \
            --tag "${{ steps.tags.outputs.ghcr-tag }}" \
            "${{ steps.tags.outputs.dockerhub-tag }}"


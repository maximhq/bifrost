name: Update Nix hashes (transport release)

on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: nix-hashes
  cancel-in-progress: false

jobs:
  update:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.event.release.tag_name, 'transports/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.sha }}
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v9

      - name: Compute hashes from release tree
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: bash nix/packages/update-hashes.sh

      - name: Apply hashes to main and commit
        run: |
          # Save computed hashes
          VENDOR_HASH=$(cat nix/packages/vendorHash)
          NPM_HASH=$(cat nix/packages/npmDepsHash)

          # Switch to main
          git checkout main
          git pull --rebase --autostash

          # Write hashes
          echo -n "$VENDOR_HASH" > nix/packages/vendorHash
          echo -n "$NPM_HASH" > nix/packages/npmDepsHash

      - uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: "chore(nix): update hashes for ${{ github.event.release.tag_name || 'manual' }}"
          commit_author: github-actions[bot] <github-actions[bot]@users.noreply.github.com>

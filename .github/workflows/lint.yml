name: Lint

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]

jobs:
  golangci:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v2.9.0
          args: --timeout=5m
  bifrostlint:
    name: bifrostlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
      - name: Run bifrostlint analyzers
        run: make lint-bifrost

# Configuration: External PostgreSQL with a dynamic password command
# Usage: helm install bifrost ./bifrost -f values-examples/external-postgres-password-command.yaml

storage:
  mode: postgres
  configStore:
    enabled: true
  logsStore:
    enabled: true

postgresql:
  enabled: false
  external:
    enabled: true
    host: "your-rds-endpoint.us-east-1.rds.amazonaws.com"
    port: 5432
    user: bifrost
    database: bifrost
    sslMode: require
    passwordCommand:
      command: aws
      args:
        - rds
        - generate-db-auth-token
        - --hostname
        - your-rds-endpoint.us-east-1.rds.amazonaws.com
        - --port
        - "5432"
        - --region
        - us-east-1
        - --username
        - bifrost
      timeout: 10s
    connMaxLifetime: 10m

vectorStore:
  enabled: false
  type: none

bifrost:
  encryptionKey: "your-encryption-key-here"
  client:
    enableLogging: true
  providers: {}

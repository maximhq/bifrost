# Configuration: PostgreSQL for config/logs + Redis for vector store
# Usage: helm install bifrost ./bifrost -f values-examples/postgres-redis.yaml

# Storage configuration
storage:
  mode: postgres
  configStore:
    enabled: true
  logsStore:
    enabled: true

# Deploy PostgreSQL
postgresql:
  enabled: true
  auth:
    username: bifrost
    password: bifrost_password
    database: bifrost
  primary:
    persistence:
      enabled: true
      size: 10Gi
    resources:
      limits:
        cpu: 1000m
        memory: 1Gi
      requests:
        cpu: 250m
        memory: 256Mi

# Deploy Redis for vector store
vectorStore:
  enabled: true
  type: redis
  redis:
    enabled: true
    auth:
      enabled: true
      password: "redis_password"
    master:
      persistence:
        enabled: true
        size: 8Gi
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 250m
          memory: 256Mi

# Bifrost configuration
bifrost:
  client:
    enableLogging: true
    # Loads the local cache plugin (direct + semantic) at boot.
    enableLocalCache: true
  providers: {}
    # Add your provider keys here

# Local cache plugin configuration (sibling of bifrost / vectorStore)
localCache:
  # Reference to external Kubernetes Secret for OpenAI API key
  # Create the secret with: kubectl create secret generic bifrost-local-cache --from-literal=openai-key=sk-YOUR_OPENAI_KEY
  secretRef:
    name: "bifrost-local-cache"
    key: "openai-key"
  config:
    provider: "openai"
    # keys are injected from the secret via environment variable
    embedding_model: "text-embedding-3-small"
    dimension: 1536
    threshold: 0.8
    ttl: "5m"


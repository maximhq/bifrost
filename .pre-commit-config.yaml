repos:
- repo: https://github.com/gitleaks/gitleaks
  rev: v8.16.3
  hooks:
  - id: gitleaks
- repo: https://github.com/golangci/golangci-lint
  rev: v2.9.0
  hooks:
  - id: golangci-lint
- repo: https://github.com/jumanjihouse/pre-commit-hooks
  rev: 3.0.0
  hooks:
  - id: shellcheck
- repo: local
  hooks:
  - id: eslint
    name: eslint (ui)
    language: system
    entry: ui/node_modules/.bin/eslint
    args: [-c, ui/eslint.config.mjs, --max-warnings=0, --fix]
    files: ^ui/.*\.(mjs|cjs|jsx|tsx?|js)$
    exclude: ^ui/node_modules/
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v4.4.0
  hooks:
  - id: end-of-file-fixer
  - id: trailing-whitespace
- repo: https://github.com/pylint-dev/pylint
  rev: v2.17.2
  hooks:
  - id: pylint
- repo: local
  hooks:
  - id: bifrostlint-go-filenames
    name: bifrostlint - go filenames have no underscores except _test.go
    language: system
    entry: bash -c 'failed=0; for f in "$@"; do base=$(basename "$f" .go); case "$f" in *_test.go) continue;; esac; case "$base" in *_*) echo "$f: underscores not allowed in Go filenames (see AGENTS.md Code Style)"; failed=1;; esac; done; exit $failed' --
    types: [go]

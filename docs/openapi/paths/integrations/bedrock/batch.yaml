# AWS Bedrock - Batch Inference Endpoints

batch-job-create:
  post:
    operationId: bedrockCreateBatchJob
    summary: Create batch inference job (Bedrock format)
    description: |
      Creates a batch inference job using AWS Bedrock format.
      Routes to native Bedrock by default; set `x-model-provider` to route the
      job to another provider (`openai`, `gemini`, etc.).
    tags:
    - Bedrock Integration
    parameters:
    - name: x-model-provider
      in: header
      required: false
      schema:
        type: string
      description: Optional provider override for cross-provider batch routing.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../../schemas/integrations/bedrock/batch.yaml#/BedrockBatchJobRequest'
    responses:
      '200':
        description: Successful response
        content:
          application/json:
            schema:
              $ref: '../../../schemas/integrations/bedrock/batch.yaml#/BedrockBatchJobResponse'
      '400':
        description: Bad request
        content:
          application/json:
            schema:
              $ref: '../../../schemas/integrations/bedrock/common.yaml#/BedrockError'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../../../schemas/integrations/bedrock/common.yaml#/BedrockError'
    security:
    - BearerAuth: []
    - BasicAuth: []
    - VirtualKeyAuth: []
    - ApiKeyAuth: []

batch-jobs-list:
  get:
    operationId: bedrockListBatchJobs
    summary: List batch inference jobs (Bedrock format)
    description: |
      Lists batch inference jobs using AWS Bedrock format.
    tags:
    - Bedrock Integration
    parameters:
    - name: maxResults
      in: query
      schema:
        type: integer
      description: Maximum number of results to return
    - name: nextToken
      in: query
      schema:
        type: string
      description: Token for pagination
    - name: statusEquals
      in: query
      schema:
        type: string
        enum: [Submitted, InProgress, Completed, Failed, Stopping, Stopped, PartiallyCompleted, Expired, Validating,
            Scheduled]
      description: Filter by status
    - name: nameContains
      in: query
      schema:
        type: string
      description: Filter by job name containing this string
    - name: x-model-provider
      in: header
      required: false
      schema:
        type: string
      description: Optional provider override for cross-provider batch routing.
    responses:
      '200':
        description: Successful response
        content:
          application/json:
            schema:
              $ref: '../../../schemas/integrations/bedrock/batch.yaml#/BedrockBatchListResponse'
      '400':
        description: Bad request
        content:
          application/json:
            schema:
              $ref: '../../../schemas/integrations/bedrock/common.yaml#/BedrockError'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../../../schemas/integrations/bedrock/common.yaml#/BedrockError'
    security:
    - BearerAuth: []
    - BasicAuth: []
    - VirtualKeyAuth: []
    - ApiKeyAuth: []

batch-job-by-id:
  get:
    operationId: bedrockRetrieveBatchJob
    summary: Retrieve batch inference job (Bedrock format)
    description: |
      Retrieves a batch inference job using AWS Bedrock format.
    tags:
    - Bedrock Integration
    parameters:
    - name: job_arn
      in: path
      required: true
      schema:
        type: string
      description: |
        Bedrock job ARN (URL-encoded). For non-Bedrock providers, the
        `arn:aws:bedrock:us-east-1:444444444444:batch:` prefix is stripped
        automatically before routing.
    - name: x-model-provider
      in: header
      required: false
      schema:
        type: string
      description: Optional provider override for cross-provider batch routing.
    responses:
      '200':
        description: Successful response
        content:
          application/json:
            schema:
              $ref: '../../../schemas/integrations/bedrock/batch.yaml#/BedrockBatchJobResponse'
      '400':
        description: Bad request
        content:
          application/json:
            schema:
              $ref: '../../../schemas/integrations/bedrock/common.yaml#/BedrockError'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../../../schemas/integrations/bedrock/common.yaml#/BedrockError'

    security:
    - BearerAuth: []
    - BasicAuth: []
    - VirtualKeyAuth: []
    - ApiKeyAuth: []

batch-job-cancel:
  post:
    operationId: bedrockCancelBatchJob
    summary: Cancel batch inference job (Bedrock format)
    description: |
      Stops a batch inference job using AWS Bedrock format.
    tags:
    - Bedrock Integration
    parameters:
    - name: job_arn
      in: path
      required: true
      schema:
        type: string
      description: |
        Bedrock job ARN to stop (URL-encoded). For non-Bedrock providers, the
        `arn:aws:bedrock:us-east-1:444444444444:batch:` prefix is stripped
        automatically before routing.
    - name: x-model-provider
      in: header
      required: false
      schema:
        type: string
      description: Optional provider override for cross-provider batch routing.
    responses:
      '200':
        description: Successful response
        content:
          application/json:
            schema:
              $ref: '../../../schemas/integrations/bedrock/batch.yaml#/BedrockBatchCancelResponse'
      '400':
        description: Bad request
        content:
          application/json:
            schema:
              $ref: '../../../schemas/integrations/bedrock/common.yaml#/BedrockError'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../../../schemas/integrations/bedrock/common.yaml#/BedrockError'
    security:
    - BearerAuth: []
    - BasicAuth: []
    - VirtualKeyAuth: []
    - ApiKeyAuth: []

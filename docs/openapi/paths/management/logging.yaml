logs-recalculate-cost:
  post:
    operationId: recalculateLogCosts
    summary: Recalculate log costs
    description: |
      Starts an asynchronous background job that recalculates log costs in batches.
      The returned payload is a job status object that can be polled via the status endpoint.
    tags:
      - Logging
    requestBody:
      required: false
      content:
        application/json:
          schema:
            $ref: '../../schemas/management/logging.yaml#/RecalculateCostRequest'
    security:
      - ManagementBearerAuth: []
    responses:
      '202':
        description: Cost recalculation job accepted
        content:
          application/json:
            schema:
              $ref: '../../schemas/management/logging.yaml#/RecalculateCostResponse'
      '409':
        description: A recalculation job is already running
        content:
          application/json:
            schema:
              $ref: '../../schemas/management/logging.yaml#/RecalculateCostResponse'
      '400':
        $ref: '../../openapi.yaml#/components/responses/BadRequest'
      '503':
        description: Background job runner is not available
        content:
          application/json:
            schema:
              $ref: '../../schemas/management/common.yaml#/ErrorResponse'
      '500':
        $ref: '../../openapi.yaml#/components/responses/InternalError'

logs-recalculate-cost-status:
  get:
    operationId: getRecalculateCostStatus
    summary: Get log cost recalculation status
    description: |
      Returns the current status of a log cost recalculation job.
      When `id` is omitted, the current in-flight job is returned, or `idle` when no job is running.
    tags:
      - Logging
    parameters:
      - name: id
        in: query
        description: Optional recalculation job ID to fetch
        schema:
          type: string
    security:
      - ManagementBearerAuth: []
    responses:
      '200':
        description: Recalculation job status
        content:
          application/json:
            schema:
              $ref: '../../schemas/management/logging.yaml#/RecalculateCostResponse'
      '404':
        description: Recalculation job not found
        content:
          application/json:
            schema:
              $ref: '../../schemas/management/common.yaml#/ErrorResponse'
      '503':
        description: Background job runner is not available
        content:
          application/json:
            schema:
              $ref: '../../schemas/management/common.yaml#/ErrorResponse'
      '500':
        $ref: '../../openapi.yaml#/components/responses/InternalError'

mcp-logs:
  get:
    operationId: getMCPLogs
    summary: Get MCP tool logs
    description: |
      Retrieves MCP tool execution logs with filtering, search, and pagination via query parameters.
    tags:
      - Logging
    parameters:
      - name: tool_names
        in: query
        description: Comma-separated list of tool names to filter by
        schema:
          type: string
      - name: server_labels
        in: query
        description: Comma-separated list of server labels to filter by
        schema:
          type: string
      - name: status
        in: query
        description: Comma-separated list of statuses to filter by (processing, success, error)
        schema:
          type: string
          enum: [processing, success, error]
      - name: virtual_key_ids
        in: query
        description: Comma-separated list of virtual key IDs to filter by
        schema:
          type: string
      - name: llm_request_ids
        in: query
        description: Comma-separated list of LLM request IDs to filter by
        schema:
          type: string
      - name: start_time
        in: query
        description: Start time filter (RFC3339 format)
        schema:
          type: string
          format: date-time
      - name: end_time
        in: query
        description: End time filter (RFC3339 format)
        schema:
          type: string
          format: date-time
      - name: min_latency
        in: query
        description: Minimum latency filter (milliseconds)
        schema:
          type: number
      - name: max_latency
        in: query
        description: Maximum latency filter (milliseconds)
        schema:
          type: number
      - name: content_search
        in: query
        description: Search in tool arguments and results
        schema:
          type: string
      - name: limit
        in: query
        description: Number of logs to return (default 50, max 1000)
        schema:
          type: integer
          default: 50
          maximum: 1000
      - name: offset
        in: query
        description: Number of logs to skip
        schema:
          type: integer
          default: 0
      - name: sort_by
        in: query
        description: Field to sort by
        schema:
          type: string
          enum: [timestamp, latency, cost]
          default: timestamp
      - name: order
        in: query
        description: Sort order
        schema:
          type: string
          enum: [asc, desc]
          default: desc
    security:
      - ManagementBearerAuth: []
    responses:
      '200':
        description: Successful response
        content:
          application/json:
            schema:
              $ref: '../../schemas/management/logging.yaml#/SearchMCPLogsResponse'
      '400':
        $ref: '../../openapi.yaml#/components/responses/BadRequest'
      '500':
        $ref: '../../openapi.yaml#/components/responses/InternalError'

  delete:
    operationId: deleteMCPLogs
    summary: Delete MCP tool logs
    description: Deletes MCP tool logs by their IDs.
    tags:
      - Logging
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../schemas/management/logging.yaml#/DeleteMCPLogsRequest'
    security:
      - ManagementBearerAuth: []
    responses:
      '200':
        description: MCP tool logs deleted successfully
        content:
          application/json:
            schema:
              $ref: '../../schemas/management/common.yaml#/MessageResponse'
      '400':
        $ref: '../../openapi.yaml#/components/responses/BadRequest'
      '500':
        $ref: '../../openapi.yaml#/components/responses/InternalError'


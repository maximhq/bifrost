execute-tool:
  post:
    operationId: executeMCPTool
    summary: Execute MCP tool
    description: Executes an MCP tool and returns the result.
    tags:
      - MCP
    parameters:
      - name: format
        in: query
        required: false
        description: |
          Format of the tool execution request/response.
        schema:
          type: string
          enum: [chat, responses]
          default: chat
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../schemas/management/mcp.yaml#/ExecuteToolRequest'
          examples:
            chat:
              summary: Chat format example
              value:
                id: "call_123"
                type: "function"
                function:
                  name: "get_weather"
                  arguments: '{"location": "San Francisco"}'
            responses:
              summary: Responses format example
              value:
                call_id: "call_123"
                name: "get_weather"
                arguments: '{"location": "San Francisco"}'
    responses:
      '200':
        description: Tool executed successfully
        content:
          application/json:
            schema:
              $ref: '../../schemas/management/mcp.yaml#/ExecuteToolResponse'
            examples:
              chat:
                summary: Chat format response
                value:
                  name: "get_weather"
                  role: "tool"
                  tool_call_id: "call_123"
                  content: "The weather in San Francisco is 72°F and sunny."
              responses:
                summary: Responses format response
                value:
                  id: "msg_123"
                  type: "function_call_output"
                  status: "completed"
                  role: "assistant"
                  call_id: "call_123"
                  name: "get_weather"
                  arguments: '{"location": "San Francisco"}'
                  content: "The weather in San Francisco is 72°F and sunny."
      '400':
        $ref: '../../openapi.yaml#/components/responses/BadRequest'
      '500':
        $ref: '../../openapi.yaml#/components/responses/InternalError'
    security:
      - BearerAuth: []
      - BasicAuth: []
      - VirtualKeyAuth: []
      - ApiKeyAuth: []

clients:
  get:
    operationId: getMCPClients
    summary: List MCP clients
    description: |
      Returns a paginated list of configured MCP clients with their tools and connection state.
      Supports case-insensitive name search and exact-match filtering by connection type, auth type,
      code-mode, and enabled/disabled status. Multi-value filters accept a comma-separated list and
      use OR semantics within a field.
    tags:
      - MCP
    parameters:
      - name: limit
        in: query
        description: Maximum number of clients to return (1–100, default 25).
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 25
      - name: offset
        in: query
        description: Number of clients to skip.
        schema:
          type: integer
          minimum: 0
      - name: search
        in: query
        description: Case-insensitive search by client name.
        schema:
          type: string
      - name: server
        in: query
        description: Filter to a single client by its exact client_id.
        schema:
          type: string
      - name: connection_type
        in: query
        description: Comma-separated connection types to include (OR semantics).
        schema:
          type: string
          example: http,sse
      - name: auth_type
        in: query
        description: Comma-separated auth types to include (OR semantics).
        schema:
          type: string
          example: oauth,per_user_oauth
      - name: state
        in: query
        description: |
          Comma-separated runtime connection states to include (OR semantics),
          resolved against live engine state. `connected` matches clients the engine
          currently reports as connected; `disconnected` matches everything else.
        schema:
          type: string
          example: connected
      - name: all_virtual_keys
        in: query
        description: When true, include clients that are open to all virtual keys (allow_on_all_virtual_keys). ORs with virtual_keys.
        schema:
          type: boolean
      - name: virtual_keys
        in: query
        description: Comma-separated virtual key IDs; includes clients explicitly assigned to any of them. ORs with all_virtual_keys.
        schema:
          type: string
      - name: code_mode
        in: query
        description: Filter by code-mode clients. Omit for no filter.
        schema:
          type: boolean
      - name: disabled
        in: query
        description: Filter by disabled status — true returns disabled clients, false returns enabled clients. Omit for no filter.
        schema:
          type: boolean
    security:
      - ManagementBearerAuth: []
    responses:
      '200':
        description: Successful response
        content:
          application/json:
            schema:
              $ref: '../../schemas/management/mcp.yaml#/MCPClientsListResponse'
      '400':
        $ref: '../../openapi.yaml#/components/responses/BadRequest'
      '500':
        $ref: '../../openapi.yaml#/components/responses/InternalError'

client:
  post:
    operationId: addMCPClient
    summary: Add MCP client
    description: |
      Adds a new MCP client with the specified configuration.
      Note: tool_pricing is not available when creating a new client as tools are fetched after client creation.
    tags:
      - MCP
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../schemas/management/mcp.yaml#/MCPClientCreateRequest'
    security:
      - ManagementBearerAuth: []
    responses:
      '200':
        description: |
          MCP client added successfully. For auth_type "oauth" and
          "per_user_oauth" the client is not created yet — the response is the
          pending_oauth variant carrying authorize_url plus status_url /
          complete_url / next_steps hints; the client is created when the flow
          is completed via complete_url.
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '../../schemas/management/common.yaml#/SuccessResponse'
                - $ref: '../../schemas/management/oauth.yaml#/OAuthFlowInitiation'
      '400':
        $ref: '../../openapi.yaml#/components/responses/BadRequest'
      '500':
        $ref: '../../openapi.yaml#/components/responses/InternalError'

client-by-id:
  put:
    operationId: editMCPClient
    summary: Edit MCP client
    description: |
      Updates an existing MCP client's configuration.
      Unlike client creation, tool_pricing can be included to set per-tool execution costs since tools are already fetched.
      Optionally provide vk_configs to manage which virtual keys have access to this MCP server and with which tools. When provided, this fully replaces all existing VK assignments in a single atomic transaction.
      Set disabled: true to shut down the client's connection and workers without removing it. Set disabled: false to reconnect a previously disabled client.
    tags:
      - MCP
    parameters:
      - name: id
        in: path
        required: true
        description: MCP client ID
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../schemas/management/mcp.yaml#/MCPClientUpdateRequest'
    security:
      - ManagementBearerAuth: []
    responses:
      '200':
        description: MCP client updated successfully
        content:
          application/json:
            schema:
              $ref: '../../schemas/management/common.yaml#/SuccessResponse'
      '400':
        $ref: '../../openapi.yaml#/components/responses/BadRequest'
      '500':
        $ref: '../../openapi.yaml#/components/responses/InternalError'

  delete:
    operationId: removeMCPClient
    summary: Remove MCP client
    description: Removes an MCP client from the configuration.
    tags:
      - MCP
    parameters:
      - name: id
        in: path
        required: true
        description: MCP client ID
        schema:
          type: string
    security:
      - ManagementBearerAuth: []
    responses:
      '200':
        description: MCP client removed successfully
        content:
          application/json:
            schema:
              $ref: '../../schemas/management/common.yaml#/SuccessResponse'
      '400':
        $ref: '../../openapi.yaml#/components/responses/BadRequest'
      '500':
        $ref: '../../openapi.yaml#/components/responses/InternalError'

client-reconnect:
  post:
    operationId: reconnectMCPClient
    summary: Reconnect MCP client
    description: |
      Reconnects an MCP client that is in an error or disconnected state.
      Not applicable (400) to per-user auth clients (no shared upstream
      connection) or to clients in pending_verification state — complete the
      admin verification instead.
    tags:
      - MCP
    parameters:
      - name: id
        in: path
        required: true
        description: MCP client ID
        schema:
          type: string
    security:
      - ManagementBearerAuth: []
    responses:
      '200':
        description: MCP client reconnected successfully
        content:
          application/json:
            schema:
              $ref: '../../schemas/management/common.yaml#/SuccessResponse'
      '400':
        $ref: '../../openapi.yaml#/components/responses/BadRequest'
      '500':
        $ref: '../../openapi.yaml#/components/responses/InternalError'

client-complete-oauth:
  post:
    operationId: completeMCPClientOAuth
    summary: Complete MCP client OAuth flow
    description: |
      Completes the OAuth flow for an MCP client after the user has authorized the request.
      This endpoint should be called after the OAuth provider redirects back to the callback endpoint
      and the OAuth token has been stored. It retrieves the pending MCP client configuration and
      establishes the connection with the OAuth-provided credentials.
    tags:
      - MCP
      - OAuth
    parameters:
      - name: id
        in: path
        required: true
        description: MCP client ID
        schema:
          type: string
    security:
      - ManagementBearerAuth: []
    responses:
      '200':
        description: MCP client connected successfully with OAuth
        content:
          application/json:
            schema:
              $ref: '../../schemas/management/common.yaml#/SuccessResponse'
      '400':
        description: OAuth not authorized yet or MCP client not found in pending OAuth clients
        $ref: '../../openapi.yaml#/components/responses/BadRequest'
      '404':
        description: MCP client not found in pending OAuth clients or OAuth config not found
        $ref: '../../openapi.yaml#/components/responses/NotFound'
      '500':
        $ref: '../../openapi.yaml#/components/responses/InternalError'

client-initiate-verification:
  post:
    operationId: initiateMCPClientVerification
    summary: Initiate verification for a pending MCP client
    description: |
      Starts the one-time admin OAuth authorization for an MCP client sitting
      in pending_verification state (declared via config.json with auth_type
      "oauth" or "per_user_oauth"). Runs OAuth metadata discovery (RFC 8414)
      and dynamic client registration (RFC 7591) against the client's
      connection_string when the declared oauth_config omits those fields,
      creates a fresh OAuth flow, and returns the authorization URL.

      Complete the flow like a create-time OAuth flow: open authorize_url in a
      browser, poll status_url until "authorized", then POST complete_url.
      Safe to call again if a previous attempt expired or was abandoned — each
      call starts a fresh flow.
    tags:
      - MCP
      - OAuth
    parameters:
      - name: id
        in: path
        required: true
        description: MCP client ID
        schema:
          type: string
    security:
      - ManagementBearerAuth: []
    responses:
      '200':
        description: OAuth flow initiated
        content:
          application/json:
            schema:
              $ref: '../../schemas/management/oauth.yaml#/OAuthFlowInitiation'
      '400':
        description: Client is not an OAuth-based auth type, has no pending bootstrap configuration, or has no connection_string
        $ref: '../../openapi.yaml#/components/responses/BadRequest'
      '404':
        $ref: '../../openapi.yaml#/components/responses/NotFound'
      '500':
        $ref: '../../openapi.yaml#/components/responses/InternalError'

client-verify-headers:
  post:
    operationId: verifyMCPClientHeaders
    summary: Verify a pending per-user-headers MCP client
    description: |
      Completes the one-time admin verification for an MCP client sitting in
      pending_verification state with auth_type "per_user_headers" (declared
      via config.json). The admin supplies sample values for every declared
      per_user_header_keys entry; Bifrost opens an upstream connection with
      them, discovers the tool list, persists it, and transitions the client
      to connected. The sample values are discarded — each end-user submits
      their own values at runtime. Synchronous; no browser flow.
    tags:
      - MCP
    parameters:
      - name: id
        in: path
        required: true
        description: MCP client ID
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [user_headers]
            properties:
              user_headers:
                type: object
                additionalProperties:
                  type: string
                description: |
                  Sample value for every header name declared in the client's
                  per_user_header_keys. Used once for the verification
                  connection, then discarded — never persisted.
    security:
      - ManagementBearerAuth: []
    responses:
      '200':
        description: Client verified; tools discovered and client connected
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [success]
                message:
                  type: string
                tools_count:
                  type: integer
                  description: Number of tools discovered during verification
      '400':
        description: Client is not auth_type "per_user_headers", has no per_user_header_keys declared, or user_headers is missing required keys
        $ref: '../../openapi.yaml#/components/responses/BadRequest'
      '404':
        $ref: '../../openapi.yaml#/components/responses/NotFound'
      '409':
        description: Client has already been verified (tools discovered); delete and recreate to re-verify
        $ref: '../../openapi.yaml#/components/responses/Conflict'
      '422':
        description: Upstream verification failed with the supplied header values
        content:
          application/json:
            schema:
              $ref: '../../schemas/management/common.yaml#/ErrorResponse'
      '500':
        $ref: '../../openapi.yaml#/components/responses/InternalError'

# ─── MCP Sessions (per-user credentials + pending flows) ─────────────────────

sessions:
  get:
    summary: List MCP sessions
    description: |
      Returns every per-user MCP authentication artifact visible to the caller —
      OAuth tokens, header credentials, and pending submission / consent flows.

      Row visibility is scoped to the caller's identity (Virtual Key, signed-in
      user, or asserted session ID). Server-level `headers` / `oauth` clients
      are not surfaced here; their credentials live on the MCP client config.

      When both a credential and a pending flow exist for the same
      `(identity, mcp_client)` binding, the credential is returned and the
      flow is suppressed to avoid duplicate entries.
    operationId: listMcpSessions
    tags: [MCP]
    security:
      - ManagementBearerAuth: []
    responses:
      '200':
        description: Sessions visible to the caller
        content:
          application/json:
            schema:
              $ref: '../../schemas/management/mcp.yaml#/MCPSessionsListResponse'
      '401':
        $ref: '../../openapi.yaml#/components/responses/Unauthorized'
      '500':
        $ref: '../../openapi.yaml#/components/responses/InternalError'

session-by-id:
  delete:
    summary: Revoke an MCP session
    description: |
      Revokes a session by primary key. Accepts these row kinds:
      - OAuth token rows → hard-deletes the token plus any pending OAuth flow
        for the same binding (so an in-flight callback can't undo the revoke)
      - Header credential rows → hard-deletes the credential plus any pending
        header submission flow for the same binding
      - Pending per-user-headers flow rows → hard-deletes just the flow

      Note: pending per-user OAuth flow rows are **not** revocable by this
      endpoint — they expire naturally or are cleared when the bound token
      row is revoked. To cancel a pending OAuth flow, revoke its parent token
      (if one exists) or wait for expiry.

      Bifrost does **not** call the upstream provider's revoke endpoint —
      revocation is local. Per-user-headers credentials never call upstream.
    operationId: revokeMcpSession
    tags: [MCP]
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Session / credential / flow row ID
    security:
      - ManagementBearerAuth: []
    responses:
      '204':
        description: Revoked
      '401':
        $ref: '../../openapi.yaml#/components/responses/Unauthorized'
      '404':
        $ref: '../../openapi.yaml#/components/responses/NotFound'
      '500':
        $ref: '../../openapi.yaml#/components/responses/InternalError'

session-reauth:
  post:
    summary: Re-authenticate or edit an MCP session
    description: |
      Mints a fresh authentication flow against the same MCP client and identity
      as the existing row. Two branches based on row type:

      - **OAuth token** (any non-`orphaned` row, typically `needs_reauth` —
        but `active` is also accepted) — opens a fresh upstream OAuth consent
        flow. Caller is expected to follow `authorize_url` to the provider;
        on callback the credential is replaced in place.
      - **Header credential** (`active` or `needs_update`) — opens a fresh
        per-user-headers submission flow. Caller follows the same URL field
        to the Bifrost submission form; on submit the credential is replaced
        in place. `kind: "headers"` is set on the response.

      Refused with 403 if the row is `orphaned` — a fresh credential wouldn't
      help; the issue is the identity has lost access to the MCP, which the
      admin must fix.
    operationId: reauthMcpSession
    tags: [MCP]
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Session row ID (OAuth token or header credential)
    security:
      - ManagementBearerAuth: []
    responses:
      '200':
        description: Fresh flow opened
        content:
          application/json:
            schema:
              $ref: '../../schemas/management/mcp.yaml#/MCPSessionReauthResponse'
      '401':
        $ref: '../../openapi.yaml#/components/responses/Unauthorized'
      '403':
        description: Row is orphaned — re-auth would not restore access
      '404':
        $ref: '../../openapi.yaml#/components/responses/NotFound'
      '500':
        $ref: '../../openapi.yaml#/components/responses/InternalError'

# ─── Per-User Headers submission flow ────────────────────────────────────────

per-user-headers-flow:
  get:
    summary: Get per-user-headers submission flow
    description: |
      Returns the pending submission flow row plus the live MCP client's schema
      (required header names + optional admin header names). Used by the
      `/workspace/mcp-sessions/auth?flow=<id>&kind=headers` landing page to
      render the values form.

      Requires management API authentication via `Authorization: Bearer <API key>`.
    operationId: getPerUserHeadersFlow
    tags: [MCP]
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Flow row ID
    security:
      - ManagementBearerAuth: []
    responses:
      '200':
        description: Flow detail
        content:
          application/json:
            schema:
              $ref: '../../schemas/management/mcp.yaml#/MCPHeadersFlowDetail'
      '401':
        $ref: '../../openapi.yaml#/components/responses/Unauthorized'
      '404':
        $ref: '../../openapi.yaml#/components/responses/NotFound'
      '500':
        $ref: '../../openapi.yaml#/components/responses/InternalError'
  put:
    summary: Submit per-user-headers values
    description: |
      Consumes a pending submission flow row: verifies the caller's values
      against the upstream MCP server, upserts the credential keyed by the flow
      row's (mode, identity), then deletes the flow row and the bound temp
      token. Mirrors the OAuth callback's "complete the flow" semantics.

      Values for any key not in the live `per_user_header_keys` schema are
      dropped server-side so a stale UI can't persist deprecated keys.
    operationId: submitPerUserHeadersFlow
    tags: [MCP]
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Flow row ID
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../schemas/management/mcp.yaml#/MCPHeadersSubmitRequest'
    security:
      - ManagementBearerAuth: []
    responses:
      '200':
        description: Credential persisted
        content:
          application/json:
            schema:
              $ref: '../../schemas/management/mcp.yaml#/MCPHeadersSubmitResponse'
      '400':
        $ref: '../../openapi.yaml#/components/responses/BadRequest'
      '401':
        $ref: '../../openapi.yaml#/components/responses/Unauthorized'
      '404':
        $ref: '../../openapi.yaml#/components/responses/NotFound'
      '410':
        description: Flow expired
      '422':
        description: Upstream verification failed with the supplied values
      '500':
        $ref: '../../openapi.yaml#/components/responses/InternalError'

per-user-headers-credential:
  delete:
    summary: Revoke a per-user-headers credential
    description: |
      Hard-deletes a per-user-headers credential row by primary key. Authorization
      scoping is enforced server-side — callers may only delete credentials
      visible to their identity.

      The unified DELETE /api/mcp/sessions/{id} is the more convenient entry
      point; this typed endpoint exists for callers that already know they're
      acting on a header credential row.
    operationId: revokePerUserHeadersCredential
    tags: [MCP]
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Credential row primary key
    security:
      - ManagementBearerAuth: []
    responses:
      '204':
        description: Revoked
      '401':
        $ref: '../../openapi.yaml#/components/responses/Unauthorized'
      '404':
        $ref: '../../openapi.yaml#/components/responses/NotFound'
      '500':
        $ref: '../../openapi.yaml#/components/responses/InternalError'

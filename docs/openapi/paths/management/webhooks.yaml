# Webhooks Management API

webhooks:
  get:
    operationId: listWebhookEndpoints
    summary: List webhook endpoints
    description: |
      Returns webhook endpoints, optionally filtered by search text, subscribed
      event, and disabled status. Signing secrets are never included and custom
      header values are redacted.
    tags:
      - Webhooks
    parameters:
      - name: search
        in: query
        required: false
        description: Case-insensitive match against endpoint name or URL.
        schema:
          type: string
      - name: event
        in: query
        required: false
        description: Comma-separated events; returns endpoints subscribed to any of them.
        schema:
          type: string
      - name: disabled
        in: query
        required: false
        description: Filter by disabled status. Omit for no filter.
        schema:
          type: boolean
      - name: limit
        in: query
        required: false
        schema:
          type: integer
      - name: offset
        in: query
        required: false
        schema:
          type: integer
    responses:
      '200':
        description: A page of webhook endpoints
        content:
          application/json:
            schema:
              $ref: '../../schemas/management/webhooks.yaml#/WebhookEndpointList'
      '500':
        $ref: '../../openapi.yaml#/components/responses/InternalError'
    security:
      - ManagementBearerAuth: []
  post:
    operationId: createWebhookEndpoint
    summary: Create a webhook endpoint
    description: |
      Creates a webhook endpoint. The signing secret is generated by the server
      and returned once in the response — it cannot be supplied and cannot be
      retrieved again afterwards.
    tags:
      - Webhooks
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../schemas/management/webhooks.yaml#/WebhookEndpointRequest'
    responses:
      '201':
        description: Endpoint created; signing secret returned once.
        content:
          application/json:
            schema:
              $ref: '../../schemas/management/webhooks.yaml#/WebhookEndpointWithSecret'
      '400':
        $ref: '../../openapi.yaml#/components/responses/BadRequest'
      '500':
        $ref: '../../openapi.yaml#/components/responses/InternalError'
    security:
      - ManagementBearerAuth: []

webhooks-by-id:
  get:
    operationId: getWebhookEndpoint
    summary: Get a webhook endpoint
    tags:
      - Webhooks
    parameters:
      - $ref: '#/components/parameters/WebhookEndpointId'
    responses:
      '200':
        description: The webhook endpoint
        content:
          application/json:
            schema:
              $ref: '../../schemas/management/webhooks.yaml#/WebhookEndpoint'
      '404':
        $ref: '../../openapi.yaml#/components/responses/NotFound'
      '500':
        $ref: '../../openapi.yaml#/components/responses/InternalError'
    security:
      - ManagementBearerAuth: []
  put:
    operationId: updateWebhookEndpoint
    summary: Update a webhook endpoint
    description: |
      Updates a webhook endpoint. The signing secret is immutable here — use the
      rotate-secret endpoint to change it.
    tags:
      - Webhooks
    parameters:
      - $ref: '#/components/parameters/WebhookEndpointId'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../schemas/management/webhooks.yaml#/WebhookEndpointRequest'
    responses:
      '200':
        description: The updated webhook endpoint
        content:
          application/json:
            schema:
              $ref: '../../schemas/management/webhooks.yaml#/WebhookEndpoint'
      '400':
        $ref: '../../openapi.yaml#/components/responses/BadRequest'
      '404':
        $ref: '../../openapi.yaml#/components/responses/NotFound'
      '500':
        $ref: '../../openapi.yaml#/components/responses/InternalError'
    security:
      - ManagementBearerAuth: []
  delete:
    operationId: deleteWebhookEndpoint
    summary: Delete a webhook endpoint
    tags:
      - Webhooks
    parameters:
      - $ref: '#/components/parameters/WebhookEndpointId'
    responses:
      '200':
        description: Endpoint deleted
        content:
          application/json:
            schema:
              $ref: '../../schemas/management/webhooks.yaml#/WebhookStatusResponse'
      '404':
        $ref: '../../openapi.yaml#/components/responses/NotFound'
      '500':
        $ref: '../../openapi.yaml#/components/responses/InternalError'
    security:
      - ManagementBearerAuth: []

webhooks-rotate-secret:
  post:
    operationId: rotateWebhookEndpointSecret
    summary: Rotate a webhook signing secret
    description: |
      Generates a new signing secret for the endpoint and returns it once. The
      previous secret stops verifying immediately — there is no grace window, so
      update your receiver in the same change.
    tags:
      - Webhooks
    parameters:
      - $ref: '#/components/parameters/WebhookEndpointId'
    responses:
      '200':
        description: Secret rotated; new signing secret returned once.
        content:
          application/json:
            schema:
              $ref: '../../schemas/management/webhooks.yaml#/WebhookEndpointWithSecret'
      '404':
        $ref: '../../openapi.yaml#/components/responses/NotFound'
      '500':
        $ref: '../../openapi.yaml#/components/responses/InternalError'
    security:
      - ManagementBearerAuth: []

webhooks-test:
  post:
    operationId: testWebhookEndpoint
    summary: Send a test delivery
    description: |
      Sends a sample signed delivery for the chosen event through the production
      signing path.
    tags:
      - Webhooks
    parameters:
      - $ref: '#/components/parameters/WebhookEndpointId'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../schemas/management/webhooks.yaml#/TestWebhookRequest'
    responses:
      '200':
        description: Test delivery attempted
        content:
          application/json:
            schema:
              $ref: '../../schemas/management/webhooks.yaml#/TestWebhookResponse'
      '400':
        $ref: '../../openapi.yaml#/components/responses/BadRequest'
      '404':
        $ref: '../../openapi.yaml#/components/responses/NotFound'
    security:
      - ManagementBearerAuth: []

webhooks-deliveries:
  get:
    operationId: listWebhookDeliveries
    summary: List delivery history
    description: Returns one page of delivery-attempt history for an endpoint, newest first.
    tags:
      - Webhooks
    parameters:
      - $ref: '#/components/parameters/WebhookEndpointId'
      - name: limit
        in: query
        required: false
        schema:
          type: integer
      - name: offset
        in: query
        required: false
        schema:
          type: integer
    responses:
      '200':
        description: A page of delivery history
        content:
          application/json:
            schema:
              $ref: '../../schemas/management/webhooks.yaml#/WebhookDeliveryList'
      '400':
        $ref: '../../openapi.yaml#/components/responses/BadRequest'
      '503':
        description: Logs store is not available.
        content:
          application/json:
            schema:
              $ref: '../../schemas/inference/common.yaml#/BifrostError'
    security:
      - ManagementBearerAuth: []

webhooks-deliveries-redeliver:
  post:
    operationId: redeliverWebhook
    summary: Re-queue a delivery
    description: |
      Re-queues the delivery a history record belongs to, under its original
      webhook-id so receivers can deduplicate the replay.
    tags:
      - Webhooks
    parameters:
      - name: id
        in: path
        required: true
        description: The delivery history record id to re-queue.
        schema:
          type: string
    responses:
      '202':
        description: Redelivery queued
        content:
          application/json:
            schema:
              $ref: '../../schemas/management/webhooks.yaml#/RedeliverWebhookResponse'
      '400':
        $ref: '../../openapi.yaml#/components/responses/BadRequest'
      '404':
        $ref: '../../openapi.yaml#/components/responses/NotFound'
      '409':
        description: This delivery is already in flight.
        content:
          application/json:
            schema:
              $ref: '../../schemas/inference/common.yaml#/BifrostError'
    security:
      - ManagementBearerAuth: []

components:
  parameters:
    WebhookEndpointId:
      name: id
      in: path
      required: true
      description: The webhook endpoint id.
      schema:
        type: string

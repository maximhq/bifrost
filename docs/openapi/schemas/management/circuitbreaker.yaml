# Schemas for Circuit Breaker policy management.

Signal:
  type: object
  required:
    - source
    - header_name
  properties:
    source:
      type: string
      enum:
        - response_header
      description: Part of the HTTP response to inspect. Only `response_header` is currently supported.
    header_name:
      type: string
      description: HTTP response header name to inspect (case-insensitive).
    header_value:
      type: string
      description: |
        Trips when the header value exactly equals this string (case-insensitive).
        Mutually exclusive with `header_contains`. If neither is set, the signal trips whenever the header is present.
    header_contains:
      type: string
      description: |
        Trips when the header value contains this substring (case-insensitive).
        Mutually exclusive with `header_value`. If neither is set, the signal trips whenever the header is present.

Condition:
  type: object
  required:
    - signals
  properties:
    operator:
      type: string
      enum:
        - OR
        - AND
      default: OR
      description: |
        How multiple signals are combined.
        `OR` (default): circuit opens when any signal matches.
        `AND`: circuit opens only when all signals match simultaneously.
    signals:
      type: array
      minItems: 1
      description: List of response signals to evaluate. At least one required.
      items:
        $ref: '#/Signal'

CircuitBreakerPolicy:
  type: object
  required:
    - name
    - primary_provider
    - primary_model
    - fallback_provider
    - fallback_model
    - condition
  properties:
    name:
      type: string
      description: Unique name for this policy.
    enabled:
      type: boolean
      default: true
      description: When `false`, the policy is registered but all hooks skip it.
    primary_provider:
      type: string
      description: Provider to monitor (e.g. `azure`, `openai`).
    primary_model:
      type: string
      description: Model name as it appears in requests (e.g. `gpt-4o-ptu`).
    primary_key_ids:
      type: array
      items:
        type: string
      description: |
        API key UUIDs to track individually. Each key gets its own sub-circuit.
        The main circuit opens only when all listed keys have tripped.
        Leave empty to use a single shared circuit for all keys serving this provider+model.
    fallback_provider:
      type: string
      description: Provider to route to when the circuit is open.
    fallback_model:
      type: string
      description: Model to request from the fallback provider when the circuit is open.
    condition:
      $ref: '#/Condition'
    default_cooldown:
      description: |
        How long to keep the circuit open (in nanoseconds).
        Accepted as a Go duration string on write (e.g. `"30s"`, `"5m"`); returned as an integer (nanoseconds) on read.
        Defaults to 30 seconds (30000000000 ns).
      oneOf:
        - type: string
          pattern: '^[0-9]+(ns|us|µs|ms|s|m|h)$'
          description: Go duration string accepted on write.
        - type: integer
          format: int64
          description: Nanoseconds returned on read.
    cooldown_header:
      type: string
      description: |
        Response header whose value (in milliseconds) overrides `default_cooldown`.
        Falls back to `default_cooldown` when the header is absent or unparsable.

CircuitBreakerPolicyListResponse:
  type: object
  properties:
    policies:
      type: array
      items:
        $ref: '#/CircuitBreakerPolicy'
    count:
      type: integer
      description: Total number of policies returned.

CircuitState:
  type: object
  description: Runtime state of a single circuit (main circuit or per-key sub-circuit).
  properties:
    status:
      type: string
      description: Current circuit status. `open` means the circuit is tripped and requests are being rerouted.
    opened_at:
      type: string
      format: date-time
      description: When the circuit was last tripped.
    cooldown:
      type: integer
      format: int64
      description: Cooldown duration in nanoseconds.
    expires_at:
      type: string
      format: date-time
      description: When the cooldown expires and the circuit will be probed again.

CircuitBreakerStateResponse:
  type: object
  properties:
    circuits:
      type: object
      description: |
        Map of circuit keys to their current state.
        Main circuit key: the policy name.
        Sub-circuit key: `"<policy_name>\x00<key_id>"`.
      additionalProperties:
        $ref: '#/CircuitState'

MessageResponse:
  type: object
  properties:
    message:
      type: string

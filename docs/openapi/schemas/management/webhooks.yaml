# Webhooks API schemas

WebhookEvent:
  type: string
  enum:
    - async_job.completed
    - async_job.failed
  description: |
    A terminal async-job event a webhook endpoint can subscribe to:
    - async_job.completed: an async job finished successfully
    - async_job.failed: an async job finished with an error

SecretVarValue:
  description: |
    A secret-bearing value. May be a plain string, or an object referencing an
    environment variable so the literal value is never stored inline.
  oneOf:
    - type: string
    - type: object
      properties:
        value:
          type: string
        env_var:
          type: string
        from_env:
          type: boolean
      additionalProperties: false

WebhookEndpointRequest:
  type: object
  required:
    - name
    - url
    - events
  description: |
    Create or update body for a webhook endpoint. The signing secret is never
    accepted here — it is generated by the server and returned once at creation,
    and can only be changed through the rotate-secret endpoint.
  properties:
    name:
      type: string
      description: Unique endpoint name.
    url:
      type: string
      description: Delivery URL. HTTPS is required unless allow_private_network is set.
    events:
      type: array
      items:
        $ref: '#/WebhookEvent'
      description: Events this endpoint subscribes to.
    headers:
      type: object
      additionalProperties:
        $ref: '#/SecretVarValue'
      description: |
        Custom headers sent with every delivery. Values support env var syntax
        ("env.MY_VAR") and are encrypted at rest. Reserved delivery headers
        (webhook-id, webhook-timestamp, webhook-signature, content-type, etc.)
        cannot be overridden.
    include_response:
      type: boolean
      default: false
      description: Inline the job response into delivery payloads, capped by max_response_payload_kbs.
    allow_private_network:
      type: boolean
      default: false
      description: Permit private-network receivers and plain http. Link-local and metadata addresses stay blocked.
    disabled:
      type: boolean
      default: false
      description: Register the endpoint without delivering to it.
    max_retries:
      type: integer
      minimum: 0
      description: Retries after the first failed attempt (default 4). 0 selects the default.
    retry_backoff_initial_seconds:
      type: integer
      minimum: 0
      description: Delay before the first retry; each further retry doubles it (default 30). 0 selects the default.
    retry_backoff_max_seconds:
      type: integer
      minimum: 0
      description: Cap on the per-retry delay (default 1800). 0 selects the default.
    attempt_timeout_seconds:
      type: integer
      minimum: 0
      description: End-to-end bound for one delivery attempt (default 10). 0 selects the default.
    max_response_payload_kbs:
      type: integer
      minimum: 0
      description: Cap for inlined response payloads in KB when include_response is set (default 256). 0 selects the default.
    max_concurrent_deliveries:
      type: integer
      minimum: 0
      description: Concurrent in-flight deliveries to this endpoint per node (default 10). 0 selects the default.

RedactedSecretVar:
  type: object
  description: |
    A redacted secret-bearing value as returned in responses. The literal is
    masked ("<REDACTED>"); ref and type describe the original source when set.
  properties:
    value:
      type: string
    ref:
      type: string
    type:
      type: string
  additionalProperties: false

WebhookEndpoint:
  type: object
  description: |
    A registered webhook endpoint. The signing secret is never included in this
    representation; custom header values are redacted.
  properties:
    id:
      type: string
    name:
      type: string
    url:
      type: string
    events:
      type: array
      items:
        $ref: '#/WebhookEvent'
    headers:
      type: object
      additionalProperties:
        $ref: '#/RedactedSecretVar'
      description: Custom delivery header values, redacted.
    include_response:
      type: boolean
    allow_private_network:
      type: boolean
    disabled:
      type: boolean
    max_retries:
      type: integer
    retry_backoff_initial_seconds:
      type: integer
    retry_backoff_max_seconds:
      type: integer
    attempt_timeout_seconds:
      type: integer
    max_response_payload_kbs:
      type: integer
    max_concurrent_deliveries:
      type: integer
    consecutive_failures:
      type: integer
      description: Number of consecutive failed deliveries; reset on the next success.
    last_success_at:
      type: string
      format: date-time
    last_failure_at:
      type: string
      format: date-time
    config_hash:
      type: string
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time

WebhookEndpointList:
  type: object
  properties:
    endpoints:
      type: array
      items:
        $ref: '#/WebhookEndpoint'
    count:
      type: integer
      description: Number of endpoints in this page.
    total_count:
      type: integer
      description: Total endpoints matching the filters.
    limit:
      type: integer
    offset:
      type: integer

WebhookEndpointWithSecret:
  type: object
  description: |
    Returned once when an endpoint is created or its secret is rotated. The
    secret is shown a single time and cannot be retrieved again.
  properties:
    endpoint:
      $ref: '#/WebhookEndpoint'
    secret:
      type: string
      description: The signing secret in whsec_ format. Store it now; it is never returned again.

TestWebhookRequest:
  type: object
  required:
    - event
  properties:
    event:
      $ref: '#/WebhookEvent'
      description: The event to render for the sample delivery. Must be one the endpoint subscribes to.

TestWebhookResponse:
  type: object
  properties:
    delivered:
      type: boolean
      description: True when the receiver answered with a 2xx status.
    receiver_status_code:
      type: integer
      description: The HTTP status the receiver returned. Present when the request reached the receiver.
    error:
      type: string
      description: Failure reason when the delivery could not be completed.

WebhookDeliveryOutcome:
  type: string
  enum:
    - delivered
    - retryable_failure
    - permanent_failure
    - exhausted
  description: |
    Outcome of a single delivery attempt:
    - delivered: the receiver returned 2xx
    - retryable_failure: failed but will be retried
    - permanent_failure: failed in a way that is not retried
    - exhausted: retries were used up without success

WebhookDelivery:
  type: object
  description: One delivery attempt in an endpoint's history.
  properties:
    id:
      type: string
    webhook_id:
      type: string
      description: The webhook-id header value; stable across retries of the same event.
    endpoint_id:
      type: string
    async_job_id:
      type: string
    request_id:
      type: string
      description: The async job's inference request id — the same id the LLM logs record. Empty when the job row expired before the attempt.
    event:
      $ref: '#/WebhookEvent'
    attempt_no:
      type: integer
    outcome:
      $ref: '#/WebhookDeliveryOutcome'
    status_code:
      type: integer
      description: HTTP status the receiver returned, when the attempt reached it.
    error:
      type: string
    created_at:
      type: string
      format: date-time
    expires_at:
      type: string
      format: date-time

WebhookDeliveryList:
  type: object
  properties:
    deliveries:
      type: array
      items:
        $ref: '#/WebhookDelivery'
    pagination:
      type: object
      properties:
        limit:
          type: integer
        offset:
          type: integer
        total_count:
          type: integer

RedeliverWebhookResponse:
  type: object
  properties:
    status:
      type: string
      example: queued
    webhook_id:
      type: string
      description: The original delivery's webhook-id, reused so receivers can deduplicate the replay.

WebhookStatusResponse:
  type: object
  properties:
    status:
      type: string
      example: success

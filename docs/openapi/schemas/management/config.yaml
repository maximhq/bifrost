# Config API schemas

Version:
  type: string
  description: Version information
  example: "1.0.0"

ClientConfig:
  type: object
  description: Client configuration
  properties:
    drop_excess_requests:
      type: boolean
      description: Whether to drop excess requests when rate limited
    prometheus_labels:
      type: array
      items:
        type: string
      description: Custom Prometheus labels
    allowed_origins:
      type: array
      items:
        type: string
      description: Allowed CORS origins
    initial_pool_size:
      type: integer
      description: Initial connection pool size
    enable_logging:
      type: boolean
      description: Whether logging is enabled
    disable_content_logging:
      type: boolean
      description: Whether content logging is disabled
    allow_per_request_content_storage_override:
      type: boolean
      default: false
      description: Allow individual requests to override content storage via the x-bf-disable-content-logging header or context key. When false (default), per-request overrides are ignored.
    allow_per_request_raw_override:
      type: boolean
      default: false
      description: Allow individual requests to override raw request/response visibility via the x-bf-send-back-raw-request and x-bf-send-back-raw-response headers. When false (default), provider-level settings are authoritative and per-request overrides are ignored.
    enforce_auth_on_inference:
      type: boolean
      description: Whether to enforce virtual key authentication on inference requests
    vk_rotation_cooldown:
      type: [string, integer]
      default: 0
      description: Cooldown after virtual key rotation - grace period during which the previous key value still authenticates. Writes accept a Go duration string (e.g. "5m", "1h"); integer values and API responses are nanoseconds (Go duration encoding). 0 disables the grace period. Maximum 30 days.
    enforce_governance_header:
      type: boolean
      deprecated: true
      description: "Deprecated: use enforce_auth_on_inference instead"
    max_request_body_size_mb:
      type: integer
      description: Maximum request body size in MB
    compat:
      type: object
      description: Compat plugin configuration
      properties:
        convert_text_to_chat:
          type: boolean
          description: Convert text completion requests to chat
        convert_chat_to_responses:
          type: boolean
          description: Convert chat completion requests to responses
        should_drop_params:
          type: boolean
          description: Drop unsupported parameters based on model catalog
        should_convert_params:
          type: boolean
          default: false
          description: Converts model parameter values that are not supported by the model
      additionalProperties: false
    log_retention_days:
      type: integer
      description: Number of days to retain logs
    header_filter_config:
      $ref: '#/HeaderFilterConfig'
    mcp_agent_depth:
      type: integer
      description: Depth of MCP agent
    mcp_tool_execution_timeout:
      type: integer
      description: Timeout for MCP tool execution in seconds
    mcp_code_mode_binding_level:
      type: string
      description: Binding level for MCP code mode
    required_headers:
      type: array
      items:
        type: string
      description: Headers that must be present on every request. Requests missing any of these headers are rejected with 400. Case-insensitive matching.
    logging_headers:
      type: array
      items:
        type: string
      description: Headers to capture in log metadata. Values are extracted from incoming requests and stored in the metadata field of log entries. Case-insensitive matching. No restart required.
    mcp_external_client_url:
      oneOf:
        - type: string
          description: Plain URL or env var reference (e.g. "env.MY_VAR")
        - type: object
          properties:
            value:
              type: string
            env_var:
              type: string
            from_env:
              type: boolean
          additionalProperties: false
      description: >
        Public base URL Bifrost uses as the redirect_uri when acting as an OAuth client to
        upstream MCP servers (Notion, Jira, etc.). Set when Bifrost's callback endpoint is
        reached via a different URL than its server-side metadata. Supports env var syntax
        ("env.MY_VAR").
    mcp_server_auth_mode:
      type: string
      enum: [headers, both, oauth]
      default: headers
      description: >
        How /mcp authenticates inbound MCP clients. 'headers' (default): VK/api-key/session
        headers only, discovery disabled. 'both': accepts header credentials and Bifrost-issued
        JWTs, discovery enabled. 'oauth': Bifrost JWTs only — disables VK/header MCP access.
    oauth2_server_config:
      type: object
      description: >
        OAuth2 authorization server settings for /mcp. Only relevant when mcp_server_auth_mode
        is 'both' or 'oauth'.
      properties:
        issuer_url:
          oneOf:
            - type: string
              description: Plain URL or env var reference (e.g. "env.MY_VAR")
            - type: object
              properties:
                value:
                  type: string
                env_var:
                  type: string
                from_env:
                  type: boolean
              additionalProperties: false
          description: >
            Stable public URL advertised as the OAuth2 AS issuer in discovery documents and the
            JWT iss claim. Required for multi-host deployments; single-host can omit it (falls
            back to the request Host header). Supports env var syntax ("env.MY_VAR").
        auth_code_ttl:
          type: integer
          minimum: 1
          maximum: 900
          default: 300
          description: Lifetime of the single-use authorization code in seconds (default 300, max 900 = 15 minutes).
        access_token_ttl:
          type: integer
          minimum: 1
          default: 600
          description: Lifetime of the issued JWT Bearer token in seconds (default 600).
        disable_vk_identity:
          type: boolean
          default: false
          description: >
            Require identity-provider login: virtual-key identity is removed from the consent
            flow, and existing virtual-key-mode grants are rejected at /mcp and denied on refresh.
            Only meaningful when mcp_server_auth_mode is 'oauth' and an identity provider is
            configured. Anonymous session identity is governed separately by enforce_auth_on_inference.
      additionalProperties: false

FrameworkConfig:
  type: object
  description: Framework configuration
  properties:
    id:
      type: integer
      description: Unique identifier for the framework config
    pricing_url:
      type: string
      description: URL for pricing data
    pricing_sync_interval:
      type: integer
      format: int64
      description: Pricing sync interval in seconds

AuthConfig:
  type: object
  description: Authentication configuration
  properties:
    admin_username:
      type: string
    admin_password:
      type: string
      description: Password (redacted as <redacted> in responses)
    is_enabled:
      type: boolean
    disable_auth_on_inference:
      type: boolean
      deprecated: true
      description: "Deprecated and ignored. Use client_config.enforce_auth_on_inference instead."

HeaderFilterConfig:
  type: object
  description: Header filter configuration
  properties:
    allowlist:
      type: array
      items:
        type: string
    denylist:
      type: array
      items:
        type: string

ProxyConfig:
  type: object
  description: Global proxy configuration
  properties:
    enabled:
      type: boolean
    type:
      type: string
      enum: [http, socks5, tcp]
    url:
      type: string
    username:
      type: string
    password:
      type: string
      description: Password (redacted as <redacted> in responses)
    no_proxy:
      type: string
    timeout:
      type: integer
    skip_tls_verify:
      type: boolean
    enable_for_scim:
      type: boolean
    enable_for_inference:
      type: boolean
    enable_for_api:
      type: boolean

RestartRequiredConfig:
  type: object
  description: Restart required configuration
  properties:
    required:
      type: boolean
    reason:
      type: string

GetConfigResponse:
  type: object
  description: Configuration response
  properties:
    client_config:
      $ref: '#/ClientConfig'
    framework_config:
      $ref: '#/FrameworkConfig'
    auth_config:
      $ref: '#/AuthConfig'
    is_db_connected:
      type: boolean
    is_cache_connected:
      type: boolean
    is_logs_connected:
      type: boolean
    proxy_config:
      $ref: '#/ProxyConfig'
    restart_required:
      $ref: '#/RestartRequiredConfig'

UpdateConfigRequest:
  type: object
  description: Update configuration request
  properties:
    client_config:
      $ref: '#/ClientConfig'
    framework_config:
      $ref: '#/FrameworkConfig'
    auth_config:
      $ref: '#/AuthConfig'
